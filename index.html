<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR With JavaScript</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/6.0.1/tesseract.min.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
  
  <div class="page">
    <!-- This is a "Image to text OCR"  -->
    <header class="card hero"> 
      <h1 class="title">Image To Text OCR</h1>
      <p class="text">Upload an image and JavaScript will try to read English or Khmer text inside it.</p>
    </header>

    <main class="grid">

      <!-- This is a "Choose AN image" block -->
      <section class="card">
        <h2 class="subtitle">1. Choose An Image</h2>
        <input class="file-input" type="file" accept="image/*" id="fileIn">
        <p class="text note">Tip: clear printed English or Khmer text works better than blurry handwriting.</p>
      </section>

      <!-- This is a "Preview" block -->
      <section class="card">
        <h2 class="subtitle">Preview</h2>
        <div class="preview">
          <img class="preview-image" id="previewImg" alt="Selected image preview">
          <span id="previewText">No image selected</span>
        </div>
      </section>

      <!-- This is a "OCR Result" block -->
      <section class="card wide">
        <h2 class="subtitle">2. OCR Result</h2>
        <p id="status" class="status text">Choose an image to start.</p>
        <div class="actions">
          <button class="button" id="copyBtn" disabled>Copy Text</button>
          <button class="button" id="clearBtn">Clear</button>
        </div>
        <textarea class="text-output" id="textOut" placeholder="Detected text will appear here..."></textarea>
      </section>
    </main>
  </div>
</body>
</html>
